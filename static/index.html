<!DOCTYPE html>
<html>
    <head>
        <title>Project IoNoW</title>
        <style>
            body{
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                gap: 1em;
                padding: .5em;
                background: #ccc;
                justify-content: space-around;
                align-items: center;
            }

            iframe{
                background: white;
                width: 100%;
                height: 90vh;
                border: 4px solid black;
                filter: brightness(0.9);
                /*filter: saturate(0.5) brightness(0.5);*/
                transition: all .1s;
                pointer-events: all;
            }

            iframe.active {
                border-color: orange;
                filter: none;
            }
        </style>
    </head>
    <body>
        <iframe src="/demo.html?proto=http"></iframe>
        <iframe src="/demo.html?proto=ws"></iframe>
        <iframe src="/demo.html?proto=mqtt"></iframe>

        <script>
          function checkFocus() {
            if(document.activeElement?.tagName === 'IFRAME' && !document.activeElement.classList.contains('active')) {
              document.querySelector('iframe.active')?.classList?.remove?.('active')
              document.activeElement.classList.add('active')
            }
          }

          window.setInterval(checkFocus, 50);

          window.onpointerdown = ()=>document.querySelector('iframe.active')?.classList?.remove?.('active')

          window.onkeydown = ({key})=>{
            switch(key.toUpperCase()){
              case '1':
              case 'Q':
                document.querySelectorAll('iframe')[0].focus()
                break
              case '2':
              case 'W':
                document.querySelectorAll('iframe')[1].focus()
                break
              case '3':
              case 'E':
                document.querySelectorAll('iframe')[2].focus()
                break
            }
          }
        </script>
    </body>
</html>
